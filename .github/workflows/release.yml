name: Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        type: choice
        options:
          - beta
          - rc
          - stable
      version:
        description: "Version (e.g., 1.0.0). For beta/rc, suffix is added automatically."
        required: true
        type: string
      source_ref:
        description: "Git ref to build from (tag, branch, or SHA). Defaults to main."
        required: false
        default: main
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    outputs:
      full_version: ${{ steps.version.outputs.full_version }}
      docker_tags: ${{ steps.version.outputs.docker_tags }}
    steps:
      - name: Compute version and tags
        id: version
        env:
          CHANNEL: ${{ inputs.channel }}
          VERSION: ${{ inputs.version }}
          REPO: ${{ github.repository }}
        run: |
          case "$CHANNEL" in
            beta)
              FULL_VERSION="${VERSION}-beta.1"
              TAGS="ghcr.io/${REPO}:${FULL_VERSION},ghcr.io/${REPO}:beta"
              ;;
            rc)
              FULL_VERSION="${VERSION}-rc.1"
              TAGS="ghcr.io/${REPO}:${FULL_VERSION},ghcr.io/${REPO}:rc"
              ;;
            stable)
              FULL_VERSION="${VERSION}"
              MAJOR_MINOR=$(echo "$VERSION" | grep -oP '^\d+\.\d+')
              TAGS="ghcr.io/${REPO}:${FULL_VERSION},ghcr.io/${REPO}:${MAJOR_MINOR},ghcr.io/${REPO}:latest"
              ;;
          esac
          echo "full_version=${FULL_VERSION}" >> "$GITHUB_OUTPUT"
          echo "docker_tags=${TAGS}" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build and Push (${{ inputs.channel }})
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ needs.validate.outputs.docker_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          build-args: |
            VERSION=${{ needs.validate.outputs.full_version }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
