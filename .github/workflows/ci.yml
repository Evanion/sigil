name: CI

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Detect which projects changed to skip unnecessary work
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'cli/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.cargo/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  rust:
    name: Rust
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.rust == 'true'
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.1"
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Check
        run: cargo check --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Format
        run: cargo fmt --check

      - name: Test with coverage
        run: cargo llvm-cov nextest --workspace --profile ci --lcov --output-path lcov-rust.info

      - name: Report test results
        uses: dorny/test-reporter@v3
        if: always() && hashFiles('target/nextest/ci/junit.xml') != ''
        with:
          name: Rust Tests
          path: target/nextest/ci/junit.xml
          reporter: java-junit

      - name: Upload Rust coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov-rust.info
          flags: rust
          fail_ci_if_error: false

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.frontend == 'true'
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Lint
        run: cd frontend && pnpm lint

      - name: Format check
        run: cd frontend && pnpm format:check

      - name: Test with coverage
        run: cd frontend && pnpm test -- --reporter=default --reporter=junit --outputFile=test-results/junit.xml --coverage --coverage.reporter=lcov --coverage.reportsDirectory=coverage
        continue-on-error: false

      - name: Report test results
        uses: dorny/test-reporter@v3
        if: always() && hashFiles('frontend/test-results/junit.xml') != ''
        with:
          name: Frontend Tests
          path: frontend/test-results/junit.xml
          reporter: java-junit

      - name: Upload Frontend coverage
        uses: codecov/codecov-action@v5
        if: hashFiles('frontend/coverage/lcov.info') != ''
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

      - name: Build
        run: cd frontend && pnpm build

  # Gate job — required by branch protection. Passes if all needed checks pass or were skipped.
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [rust, frontend]
    steps:
      - name: Check results
        env:
          RUST_RESULT: ${{ needs.rust.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
        run: |
          echo "Rust: $RUST_RESULT"
          echo "Frontend: $FRONTEND_RESULT"
          if [[ "$RUST_RESULT" == "failure" || "$FRONTEND_RESULT" == "failure" ]]; then
            echo "One or more required checks failed"
            exit 1
          fi
          echo "All checks passed or were skipped"
