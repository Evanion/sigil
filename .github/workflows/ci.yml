name: CI

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Detect which projects changed to skip unnecessary work
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            rust:
              - 'crates/**'
              - 'cli/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.cargo/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/scripts/**'
            frontend:
              - 'frontend/**'
              - '.node-version'
              - '.github/workflows/ci.yml'
              - '.github/workflows/scripts/**'

  rust:
    name: Rust
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.rust == 'true'
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: "1.94.1"
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true

      - name: Install nextest
        uses: taiki-e/install-action@2b15ad09ca0f06a76791407e35ab20f0b712d615 # nextest

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@e3f5de9dc07635c0989e7620a8768b93e675db16 # cargo-llvm-cov

      - name: Check
        run: cargo check --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Format
        run: cargo fmt --check

      - name: Test with coverage
        run: cargo llvm-cov nextest --workspace --profile ci --lcov --output-path lcov-rust.info

      - name: Report test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        if: always() && hashFiles('target/nextest/ci/junit.xml') != ''
        with:
          name: Rust Tests
          path: target/nextest/ci/junit.xml
          reporter: java-junit

      - name: Upload Rust coverage
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov-rust.info
          flags: rust
          fail_ci_if_error: false

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.frontend == 'true'
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "10.0.0"
          package_json_file: frontend/package.json

      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: '.node-version'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Lint
        run: cd frontend && pnpm lint

      - name: Format check
        run: cd frontend && pnpm format:check

      - name: Test with coverage
        run: cd frontend && pnpm test -- --reporter=default --reporter=junit --outputFile=test-results/junit.xml --coverage --coverage.reporter=lcov --coverage.reportsDirectory=coverage
        continue-on-error: false

      - name: Report test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        if: always() && hashFiles('frontend/test-results/junit.xml') != ''
        with:
          name: Frontend Tests
          path: frontend/test-results/junit.xml
          reporter: java-junit

      - name: Upload Frontend coverage
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        if: hashFiles('frontend/coverage/lcov.info') != ''
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

      - name: Build
        run: cd frontend && pnpm build

  # Lint infrastructure files for floating version references
  pin-check:
    name: Version Pin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for floating version references
        run: |
          ERRORS=0
          # Check .node-version for floating refs
          if grep -qE '(lts/\*|latest|current)' .node-version 2>/dev/null; then
            echo "::error file=.node-version::.node-version contains floating reference (must be exact version)"
            ERRORS=$((ERRORS + 1))
          fi
          # Check Dockerfiles for @latest
          for f in Dockerfile .devcontainer/Dockerfile; do
            if [ -f "$f" ] && grep -qE '@latest' "$f"; then
              echo "::error file=$f::$f contains @latest reference (must pin exact version)"
              ERRORS=$((ERRORS + 1))
            fi
          done
          # Check GitHub Actions for uses: lines without SHA pins (40-char hex).
          # Only match YAML key lines (indented "- uses:" or "uses:"), not strings
          # inside run: blocks that happen to contain "uses:".
          # RF-010: scan EVERY workflow file under .github/workflows/, not just
          # ci.yml. The earlier hardcoded path missed new workflows
          # (tauri-build.yml, future release.yml, etc.).
          for workflow_file in .github/workflows/*.yml; do
            while IFS= read -r ref; do
              if [ -z "$ref" ]; then continue; fi
              if ! echo "$ref" | grep -qE '@[0-9a-f]{40}'; then
                echo "::error file=${workflow_file}::Action not pinned to SHA: $ref"
                ERRORS=$((ERRORS + 1))
              fi
            done < <(grep -E '^\s+uses:\s' "$workflow_file" | sed 's/.*uses:\s*//' | sed 's/\s*#.*//')
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "Found $ERRORS floating version reference(s). Pin to exact versions."
            exit 1
          fi
          echo "All version references are pinned."

  kobalte-import-discipline:
    name: Kobalte Import Discipline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for direct @kobalte/core imports outside components/
        run: |
          # Search for any direct @kobalte/core import outside the components/ tree.
          # The rule (frontend-defensive.md "Kobalte Imports Must Live in components/ Wrappers"):
          # all Kobalte imports must live in frontend/src/components/<wrapper>/.
          OFFENDERS=$(grep -rln "from [\"']@kobalte/core" frontend/src 2>/dev/null \
            | grep -v "^frontend/src/components/" \
            || true)
          if [ -n "$OFFENDERS" ]; then
            echo "::error::Direct @kobalte/core imports found outside frontend/src/components/. Use a project wrapper from frontend/src/components/<name>/ instead."
            echo "Offending files:"
            echo "$OFFENDERS"
            exit 1
          fi
          echo "No direct @kobalte/core imports outside frontend/src/components/."

  discriminated-union-sentinels:
    name: Discriminated Union Sentinels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Verify every object-discriminator union has an exhaustive sentinel
        run: |
          # The rule (frontend-defensive.md "Discriminated Unions Must Have a
          # Type-Level Exhaustiveness Sentinel"): every object-discriminator
          # union in frontend/src/types/ must have a colocated .test-d.ts file
          # in frontend/src/types/__tests__/ that imports the union AND
          # contains a `const _<name>: never = ...` sentinel.
          #
          # Heuristic: an "object-discriminator union" is `export type X = A | B`
          # where the RHS contains pipes between PascalCase identifiers (no
          # string literals — those are enum-style unions that don't dispatch).
          UNIONS=$(perl -ne 'BEGIN{$/=undef} while (/^export type ([A-Z][A-Za-z0-9_]+)\s*=\s*([^;]+);/gms) { my $name = $1; my $body = $2; print "$name\n" if $body =~ /\|/ and $body !~ /"/; }' frontend/src/types/*.ts)

          if [ -z "$UNIONS" ]; then
            echo "::error::No discriminated unions detected in frontend/src/types/ — grep heuristic may be broken."
            exit 1
          fi

          # Collect content of every .test-d.ts file that contains an exhaustive sentinel.
          # The rule's canonical pattern is `const _<name>: never = x;` — any
          # identifier starting with `_` and typed as `never`.
          SENTINEL_FILES=$(grep -lE 'const _[A-Za-z0-9_]*\s*:\s*never\b' frontend/src/types/__tests__/*.test-d.ts 2>/dev/null || true)

          if [ -z "$SENTINEL_FILES" ]; then
            echo "::error::No .test-d.ts files with exhaustive sentinels found in frontend/src/types/__tests__/"
            exit 1
          fi

          SENTINEL_CONTENT=$(echo "$SENTINEL_FILES" | xargs cat)

          MISSING=""
          for TYPE in $UNIONS; do
            if ! echo "$SENTINEL_CONTENT" | grep -qE "\\b$TYPE\\b"; then
              MISSING="$MISSING $TYPE"
            fi
          done

          if [ -n "$MISSING" ]; then
            echo "::error::Discriminated unions missing exhaustive-switch sentinel:$MISSING"
            echo "::error::Each union must be referenced in a .test-d.ts file under frontend/src/types/__tests__/ that contains a 'const _: never = ...' sentinel. See document-corners.test-d.ts for the canonical example."
            exit 1
          fi

          echo "Every discriminated union has an exhaustive-switch sentinel:"
          echo "$UNIONS" | sed 's/^/  /'

  i18n-allowlist-rationale:
    name: i18n Allowlist Rationale
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Verify every i18next/no-literal-string disable has a rationale
        run: |
          set -euo pipefail
          # The rule (Spec 17): every `eslint-disable[-next-line] i18next/no-literal-string`
          # directive in frontend/src must have a paired `i18n-allow: <rationale>` comment
          # on the same line OR on the immediately preceding line. Legitimate exceptions
          # (decorative glyphs, app name, canvas fallback text) are rare and always justified
          # inline; an unannotated disable fails the build. If the count grows beyond a
          # handful, the rule's scope should be reconsidered rather than silently
          # accumulate unannotated disables.
          #
          # Hardening (PR #66 review):
          #   RF-005: clamp sed lower bound so a line-1 disable does not produce "sed 0,1p".
          #   RF-015: validate lineno is digit-only before arithmetic — bash arithmetic
          #           recursively expands variables, so an attacker-controlled string flowing
          #           into $((lineno - 1)) would be a command-injection sink.
          #   RF-016: parse grep output with parameter expansion instead of `cut -d:` so a
          #           filename containing ':' produces a CI warning rather than a confusing
          #           sed failure. Filenames with ':' are rare; this trades hard enforcement
          #           on unusual filenames for forward-progress on normal ones.
          #   RF-017: require at least one 3+-letter alphabetic word somewhere after
          #           `i18n-allow:` so an empty rationale (`// i18n-allow:` or a marker
          #           followed only by punctuation/digits) does not pass. The regex
          #           tolerates leading punctuation so rationales that quote a glyph
          #           before the explanation (`i18n-allow: "= " prefix is decorative`)
          #           still validate.
          #   RF-032: bash array accumulator emitted via `printf '%s\n'` — the previous
          #           `bad="$bad\n..."` form left a leading blank line in error output when
          #           bad started empty.
          matches=$(grep -rEn 'eslint-disable(-next-line)?[^\n]*i18next/no-literal-string' frontend/src --include='*.ts' --include='*.tsx' || true)
          if [ -z "$matches" ]; then
            echo "No i18next/no-literal-string disables found — nothing to check."
            exit 0
          fi
          bad=()
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            # grep -n format is "<file>:<lineno>:<rest>". Parameter expansion is purely
            # textual — no field splitting, no shell evaluation — so it tolerates ':' in
            # rest without misparsing. If the filename itself contains ':' the second
            # split picks up filename bytes instead of digits; the digit-only check below
            # detects that and skips with a CI warning instead of crashing sed.
            file="${line%%:*}"
            rest="${line#*:}"
            lineno="${rest%%:*}"
            if ! [[ "$lineno" =~ ^[0-9]+$ ]]; then
              echo "::warning::Skipping grep line with non-numeric line field (filename may contain ':'): $line"
              continue
            fi
            # Clamp: sed rejects address 0, and `set -e` makes that fatal.
            start=$((lineno > 1 ? lineno - 1 : 1))
            # `--` guards against filenames beginning with '-' being parsed as flags.
            window=$(sed -n "${start},${lineno}p" -- "$file")
            # Require at least one 3+-letter alphabetic word somewhere after the
            # `i18n-allow:` marker. An empty `// i18n-allow:` (or one followed
            # only by punctuation/digits) does not constitute a rationale.
            # Allowing leading non-alphabetic characters accommodates rationales
            # that quote a glyph or symbol before the explanation
            # (e.g. `i18n-allow: "= " prefix is a decorative marker`).
            if ! echo "$window" | grep -qE 'i18n-allow:.*[A-Za-z]{3,}'; then
              bad+=("$file:$lineno")
            fi
          done <<< "$matches"
          if [ "${#bad[@]}" -gt 0 ]; then
            echo "::error::eslint-disable for i18next/no-literal-string lacks a meaningful // i18n-allow: rationale comment. Add a rationale (at least one 3+-letter alphabetic word after the colon) or restructure to avoid the disable."
            printf '  %s\n' "${bad[@]}"
            exit 1
          fi
          echo "All i18next/no-literal-string disables have rationale comments."

  locale-parity:
    name: Locale Parity
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: '.node-version'

      - name: Verify en/fr/es key trees match
        run: node frontend/scripts/check-locale-parity.mjs

  locale-usage:
    name: Locale Usage
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: '.node-version'

      # Orphan-key reporting is disabled in CI because the locale files
      # legitimately ship pre-defined common keys (cancel, ok, undo, etc.)
      # and tool labels that may not yet be wired into source. Re-enable
      # orphan checking by removing `--no-orphans` once the spec coverage
      # catches up.
      - name: Verify every t() call references an existing locale key
        run: node frontend/scripts/check-locale-usage.mjs --no-orphans

  delete-node-removal-discipline:
    name: DeleteNode Removal Discipline (Spec 19)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.rust == 'true' || needs.detect-changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run sentinel violation-fires test
        run: |
          set -euo pipefail
          ./.github/workflows/scripts/test-delete-node-removal-discipline.sh
      - name: Verify no remaining singular delete-node references
        run: |
          set -euo pipefail
          # Source the shared BANNED/ALLOWED constants — exact same regexes
          # the sentinel violation-fires test exercises (RF-029).
          # shellcheck source=./scripts/delete-node-removal-discipline.env
          source ./.github/workflows/scripts/delete-node-removal-discipline.env
          HITS=$(grep -rE "$BANNED" \
            --include='*.rs' --include='*.ts' --include='*.tsx' \
            crates/ frontend/ 2>/dev/null \
            | grep -vE "$ALLOWED" \
            || true)
          if [ -n "$HITS" ]; then
            echo "::error::Singular delete-node references remain. Per Spec 19, all must be removed."
            echo "$HITS"
            exit 1
          fi
          echo "No singular delete-node references remain."

  # Gate job — required by branch protection. Passes if all needed checks pass or were skipped.
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      [rust, frontend, pin-check, kobalte-import-discipline, discriminated-union-sentinels, i18n-allowlist-rationale, locale-parity, locale-usage, delete-node-removal-discipline]
    steps:
      - name: Check results
        env:
          RUST_RESULT: ${{ needs.rust.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          PIN_CHECK_RESULT: ${{ needs.pin-check.result }}
          KOBALTE_CHECK_RESULT: ${{ needs.kobalte-import-discipline.result }}
          SENTINELS_RESULT: ${{ needs.discriminated-union-sentinels.result }}
          I18N_ALLOWLIST_RESULT: ${{ needs.i18n-allowlist-rationale.result }}
          LOCALE_PARITY_RESULT: ${{ needs.locale-parity.result }}
          LOCALE_USAGE_RESULT: ${{ needs.locale-usage.result }}
          DELETE_NODE_DISCIPLINE_RESULT: ${{ needs.delete-node-removal-discipline.result }}
        run: |
          echo "Rust: $RUST_RESULT"
          echo "Frontend: $FRONTEND_RESULT"
          echo "Pin Check: $PIN_CHECK_RESULT"
          echo "Kobalte Check: $KOBALTE_CHECK_RESULT"
          echo "Sentinels Check: $SENTINELS_RESULT"
          echo "i18n Allowlist Rationale: $I18N_ALLOWLIST_RESULT"
          echo "Locale Parity: $LOCALE_PARITY_RESULT"
          echo "Locale Usage: $LOCALE_USAGE_RESULT"
          echo "DeleteNode Removal Discipline: $DELETE_NODE_DISCIPLINE_RESULT"
          if [[ "$RUST_RESULT" == "failure" || "$FRONTEND_RESULT" == "failure" || "$PIN_CHECK_RESULT" == "failure" || "$KOBALTE_CHECK_RESULT" == "failure" || "$SENTINELS_RESULT" == "failure" || "$I18N_ALLOWLIST_RESULT" == "failure" || "$LOCALE_PARITY_RESULT" == "failure" || "$LOCALE_USAGE_RESULT" == "failure" || "$DELETE_NODE_DISCIPLINE_RESULT" == "failure" ]]; then
            echo "One or more required checks failed"
            exit 1
          fi
          echo "All checks passed or were skipped"
